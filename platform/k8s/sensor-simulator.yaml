# Gas Detection Simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-gas-detection
  namespace: iot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-gas-detection
  template:
    metadata:
      labels:
        app: sim-gas-detection
    spec:
      containers:
      - name: simulator
        image: ghcr.io/thefuriousowl/iot-sensor-simulator:latest
        args:
        - "--profile"
        - "gas-detection"
        - "--broker"
        - "mosquitto.iot.svc.cluster.local"
        - "--rate"
        - "2"
        - "--site"
        - "plant-a"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
