apiVersion: v1
kind: Namespace
metadata:
  name: iot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: iot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      containers:
      - name: web-dashboard
        image: ghcr.io/thefuriousowl/iot-web-dashboard:latest
        imagePullPolicy: Always 
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: iot
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: web-dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-dashboard
  namespace: iot
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-1:596436429175:certificate/9044a8fb-981c-4b0b-b812-038b6426f0a8
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
  - host: dashboard.nexthings-iot.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ingestion-service
            port:
              number: 3000
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: ingestion-service
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-dashboard
            port:
              number: 80
