apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: observability, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/USERNAME/iot-platform-aws.git
    targetRevision: main
    path: platform/helm/observability
  destination: { server: https://kubernetes.default.svc, namespace: monitoring }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
