apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: redis-sentinel, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/USERNAME/iot-platform-aws.git
    targetRevision: main
    path: platform/helm/redis-sentinel
  destination: { server: https://kubernetes.default.svc, namespace: iot }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
