apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  labels: { app: web-dashboard }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: web-dashboard }
  template:
    metadata:
      labels: { app: web-dashboard }
    spec:
      containers:
        - name: web-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.service.targetPort }} }
          livenessProbe:
            httpGet: { path: /, port: {{ .Values.service.targetPort }} }
          resources: {{ toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
spec:
  selector: { app: web-dashboard }
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
