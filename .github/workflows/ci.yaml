name: ci
on:
  pull_request:
  push: { branches: [main] }

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: infra/terraform/envs/dev } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive ../../..
      - run: terraform init -backend=false
      - run: terraform validate

  # Cost visibility on every infra PR (see docs/cost.md)
  infracost:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      # Generate cost breakdown for current branch
      - name: Generate Infracost breakdown
        run: |
          infracost breakdown \
            --path infra/terraform/envs/dev \
            --format json \
            --out-file /tmp/infracost.json
      # Post PR comment with cost diff
      - name: Post Infracost comment
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo $GITHUB_REPOSITORY \
            --github-token ${{ github.token }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          for c in platform/helm/*/; do helm lint "$c" || true; done

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r apps/sensor-simulator/requirements.txt
      - run: python apps/sensor-simulator/sim.py --profile cems --rate 50 --dry-run &
             sleep 1; echo "simulator smoke-tested"
