server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST API -> client-api service in-cluster
  location /api/ {
    proxy_pass http://client-api.iot.svc.cluster.local:3000/api/;
  }

  # WebSocket stream -> ingestion service
  location /stream {
    proxy_pass http://ingestion.iot.svc.cluster.local:3001/stream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
